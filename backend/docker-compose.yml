services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartspend}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartspend}
      POSTGRES_DB: ${POSTGRES_DB:-smartspend}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartspend} -d ${POSTGRES_DB:-smartspend}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartspend}:${POSTGRES_PASSWORD:-smartspend}@postgres:5432/${POSTGRES_DB:-smartspend}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-smartspend}:${POSTGRES_PASSWORD:-smartspend}@postgres:5432/${POSTGRES_DB:-smartspend}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8001}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app:celery_application worker --loglevel=info --concurrency=2
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-smartspend}:${POSTGRES_PASSWORD:-smartspend}@postgres:5432/${POSTGRES_DB:-smartspend}
      SYNC_DATABASE_URL: postgresql://${POSTGRES_USER:-smartspend}:${POSTGRES_PASSWORD:-smartspend}@postgres:5432/${POSTGRES_DB:-smartspend}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}

volumes:
  postgres_data:
  redis_data:
